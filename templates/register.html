<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <title>注册 - 雷蓓蓓个人网站</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
    
    <!-- Bootstrap CSS -->
    <link href="../static/cdn_bootstrap/bootstrap523.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link href="../static/css/modern-style.css" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="../static/cdn_bootstrap/bootstrap523.bundle.min.js"></script>
    <script src="https://www.recaptcha.net/recaptcha/enterprise.js" async defer></script>

    <!-- 百度统计 -->
    <script>

    (function() {
      var hm = document.createElement("script");
      hm.src = "https://hm.baidu.com/hm.js?faf77f98330ad0aa82d343829175f29c";

    <style type="text/css">
        body {
            background: linear-gradient(135deg, #2c3e50 0%, #4a69bd 50%, #6c5ce7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .register-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 90%;
            max-width: 500px;
            padding: 2.5rem;
            position: relative;
            margin: 3rem 0;
        }
        
        .register-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #4a69bd, #6c5ce7);
        }
        
        .register-title {
            color: #2c3e50;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 700;
        }
        
        .form-floating {
            margin-bottom: 1.5rem;
        }
        
        .form-control {
            border-radius: 8px;
            box-shadow: none;
            border: 1px solid #e1e1e1;
            padding: 1.1rem 1rem;
        }
        
        .form-control:focus {
            border-color: #4a69bd;
            box-shadow: 0 0 0 0.2rem rgba(74, 105, 189, 0.25);
        }
        
        .btn-register {
            background: linear-gradient(135deg, #4a69bd 0%, #6c5ce7 100%);
            border: none;
            border-radius: 30px;
            padding: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        
        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
        }
        
        .btn-outline-login {
            border: 2px solid #4a69bd;
            border-radius: 30px;
            color: #4a69bd;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 1rem;
            background-color: transparent;
        }
        
        .btn-outline-login:hover {
            background-color: #4a69bd;
            color: white;
        }
        
        .register-divider {
            margin: 1.5rem 0;
            border-top: 1px solid #e1e1e1;
        }
        
        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #4a69bd;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            color: #6c5ce7;
        }
        
        .password-tip {
            font-size: 0.8rem;
            color: #7f8c8d;
            text-align: right;
            margin-top: -1rem;
            margin-bottom: 1rem;
        }
        
        @media (max-width: 576px) {
            .register-container {
                width: 95%;
                padding: 1.5rem;
                margin: 1.5rem 0;
            }
        }
    </style>
</head>

<body>
    <div class="register-container">
        <h2 class="register-title">创建账户</h2>
        
        <form action="/register" method="post" class="was-validated" id="register_form">
            <div class="form-floating mb-3">
                <input placeholder="请输入用户名" required name="username" class="form-control">
                <label for="username"><i class="fas fa-user me-2"></i>用户名</label>
            </div>
            
            <div class="form-floating mb-3">
                <input placeholder="请输入邮箱" required name="contact" type="email" class="form-control">
                <label for="contact"><i class="fas fa-envelope me-2"></i>联系方式(邮箱)</label>
                <div class="invalid-feedback">请输入有效的邮箱地址</div>
            </div>
            
            <div class="form-floating mb-3">
                <input placeholder="请输入密码" required type="password" name="pwd" class="form-control" id="pwd" onchange="PwdOnChange()">
                <label for="pwd"><i class="fas fa-lock me-2"></i>密码</label>
            </div>
            <p class="password-tip">提示: 输入"auto"将自动生成强密码</p>
            
            <div class="form-floating mb-4">
                <input placeholder="请再次输入密码" required type="password" name="pwd2" class="form-control">
                <label for="pwd2"><i class="fas fa-key me-2"></i>确认密码</label>
                <div class="invalid-feedback">两次输入的密码不一致</div>
            </div>
            
            <div class="g-recaptcha mb-3" data-sitekey="6LfbDNEmAAAAAMyizoAnogNKViSjlFpzW1eGOboo" data-action="LOGIN">
            </div>
            
            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle me-1"></i> {{error}}
            </div>
            {% endif %}
            
            <button type="submit" class="btn btn-register btn-primary w-100">创建账户</button>
            
            <hr class="register-divider">
            
            <a href="/登录" class="w-100">
                <button type="button" class="btn btn-outline-login w-100">已有账户？登录</button>
            </a>
        </form>
        
        <a href="/" class="back-link"><i class="fas fa-home me-1"></i> 返回首页</a>
    </div>

    <script>
        function MkPasswd() {
            var auto_passwd = "";
            for (var i = 1; i <= 16; i++) {
                const minCharCode = 33; // ASCII码中可见字符的最小值（'!'）
                const maxCharCode = 126; // ASCII码中可见字符的最大值（'~'）
                const randomCharCode = Math.floor(Math.random() * (maxCharCode - minCharCode + 1)) + minCharCode;
                auto_passwd += String.fromCharCode(randomCharCode);
            }
            return auto_passwd;
        }
        
        function PwdOnChange() {
            var passwd_input = document.getElementById("pwd");
            var passwd = passwd_input.value;
            if (passwd == "auto") {
                var auto_password = MkPasswd();
                passwd_input.value = auto_password;
                alert("您的强密码已生成: " + auto_password + "\n请妥善保存此密码！");
            }
        }
    </script>
</body>

</html>
